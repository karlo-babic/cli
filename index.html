#!/usr/bin/env python3

import sys
import urllib.request
import subprocess
import tempfile
import os
import shlex

BASE_URL = "https://karlo.observer/cli/"

SCRIPTS = {
    "sysinfo": {
        "description": "Show basic system information",
        "url": BASE_URL + "sysinfo"
    },
    "drivers": {
        "description": "Show installed drivers and their versions",
        "url": BASE_URL + "drivers",
        "args": [
            {
                "name": "filter",
                "description": "Optional: Filter results by name (e.g., 'nvidia' or 'network')"
            }
        ]
    },
    "thermal": {
        "description": "Output temperatures of CPU, GPU, and other system sensors",
        "url": BASE_URL + "thermal"
    },
    "largest": {
        "description": "Show largest files in a directory (recursively)",
        "url": BASE_URL + "largest",
        "args": [
            {
                "name": "path",
                "description": "Optional: Directory to scan (default: current directory)"
            },
            {
                "name": "limit",
                "description": "Optional: Number of files to show (default: 10)"
            }
        ]
    },
    "search": {
        "description": "Fuzzy search large text files",
        "url": BASE_URL + "search",
        "args": [
            {
                "name": "file",
                "description": "Path to the .txt file to search"
            },
            {
                "name": "query",
                "description": "The phrase or concept to search for"
            }
        ]
    },
    "doc2txt": {
        "description": "Convert an EPUB file to TXT (uses mutool, pandoc, or Python fallback)",
        "url": BASE_URL + "doc2txt",
        "args": [
            {
                "name": "epub_file",
                "description": "Path to the EPUB file to convert"
            }
        ]
    },
    "bundle": {
        "description": "Bundle a directory structure and file contents into a single text file",
        "url": BASE_URL + "bundle",
        "args": [
            {
                "name": "output_file",
                "description": "Path where the bundled text file will be saved"
            },
            {
                "name": "root_dir",
                "description": "Path to the source directory to scan"
            },
            {
                "name": "extensions",
                "description": "Optional: Specific extensions to include (e.g., .py .js). If omitted, uses default exclusion list."
            }
        ]
    },
}

def supports_color():
    if "NO_COLOR" in os.environ:
        return False

    # Explicit opt-in
    if os.environ.get("FORCE_COLOR") == "1":
        return True

    # Windows Terminal / modern terminals
    if os.environ.get("WT_SESSION"):
        return True

    # ANSI support indicators
    if os.environ.get("ANSICON") or os.environ.get("TERM_PROGRAM"):
        return True

    # TERM-based detection (Linux/macOS)
    term = os.environ.get("TERM", "")
    if term and term != "dumb":
        return True

    return False

if supports_color():
    RED = "\033[31m"
    GREEN = "\033[32m"
    YELLOW = "\033[33m"
    BLUE = "\033[34m"
    CYAN = "\033[36m"
    RESET = "\033[0m"
else:
    RED = GREEN = YELLOW = BLUE = CYAN = RESET = ""

def run_script(name, args=None):
    if name not in SCRIPTS:
        print(f"\n{RED}[-] Unknown script: {name}{RESET}\n")
        return

    args = args or []
    script_url = SCRIPTS[name]["url"]

    # Download the script to a temporary file
    with tempfile.NamedTemporaryFile("w+", delete=False, suffix=".py") as tmp:
        try:
            with urllib.request.urlopen(script_url) as response:
                tmp.write(response.read().decode())
            tmp.flush()
        except Exception as e:
            print(f"\n{RED}[-] Failed to fetch script: {e}{RESET}\n")
            return

        # Execute the downloaded script with forwarded arguments
        cmd = ["python3", tmp.name] + args
        try:
            subprocess.run(cmd)
        except Exception as e:
            print(f"\n{RED}[-] Execution failed: {e}{RESET}\n")

def print_help():
    print(f"\n{CYAN}Available Scripts:{RESET}")
    for name, info in SCRIPTS.items():
        print(f"  {GREEN}{name:<8}{RESET} - {info.get('description','')}")
    print(f"\n{CYAN}Interactive Mode Usage:{RESET}")
    print("  Type a script name, 'help [script]', or 'exit'.")
    print(f"\n{CYAN}Direct Execution via cURL:{RESET}")
    print(f"  Linux/macOS: {YELLOW}curl -s {BASE_URL} | python3 - <script>{RESET}")
    print(f"  Windows:     {YELLOW}curl.exe -s {BASE_URL} | python3 - <script>{RESET}\n")

def main():
    if len(sys.argv) > 1:
        script_name = sys.argv[1]
        script_args = sys.argv[2:]
        run_script(script_name, script_args)
        return

    top = "    \u2554" + "\u2550"*38 + "\u2557"
    mid = "    \u2551   Remote Python Script Environment   \u2551"
    bot = "    \u255A" + "\u2550"*38 + "\u255D"
    print(f"\n{CYAN}{top}\n{mid}\n{bot}{RESET}")

    print_help()

    use_input = sys.stdin.isatty()

    if not use_input:
        try:
            if os.name == "nt":
                tty_in = open("CON", "r")
            else:
                tty_in = open("/dev/tty", "r")
        except Exception:
            tty_in = sys.stdin

    while True:
        try:
            if use_input:
                inp = input(f"{GREEN}cli>{RESET} ").strip()
            else:
                print(f"{GREEN}cli>{RESET} ", end="", flush=True)
                inp = tty_in.readline()
                if not inp:
                    continue
                inp = inp.strip()

            if inp.lower() in ("exit", "quit"):
                print("\nExiting.\n")
                break

            if inp.lower().startswith("help"):
                parts = shlex.split(inp)
                if len(parts) == 1:
                    print_help()
                else:
                    script_name = parts[1]
                    info = SCRIPTS.get(script_name)
                    if not info:
                        print(f"\n{RED}[-] No help available for unknown script '{script_name}'{RESET}\n")
                    else:
                        print(f"\n{CYAN}=== {script_name} ==={RESET}")
                        print(f"{info.get('description','')}")
                        args = info.get("args", [])
                        if args:
                            print(f"\n{YELLOW}Arguments:{RESET}")
                            for arg in args:
                                print(f"  {GREEN}{arg.get('name',''):<15}{RESET} : {arg.get('description','')}")
                        print()
                continue

            parts = shlex.split(inp)
            if not parts:
                continue

            script_name, *script_args = parts
            run_script(script_name, script_args)

        except (EOFError, KeyboardInterrupt):
            print("\n\nExiting.\n")
            break

if __name__ == "__main__":
    main()
